app:
  name: "NotebookAI"
  env: "development"
  port: 8081

log:
  level: "debug"
  file_path: "logs/app.log"
  max_size: 100
  max_backups: 3
  max_age: 7
  compress: true

database:
  postgres:
    dsn: "host=localhost user=postgres password=postgres dbname=pdf_ai port=5433 sslmode=disable TimeZone=Asia/Shanghai"
    max_idle_conns: 10
    max_open_conns: 100
    conn_max_lifetime: 3600

cache:
  redis:
    addr: "localhost:6380"
    password: ""
    db: 0
    pool_size: 100
    min_idle_conns: 10

milvus:
  address: ""
  username: ""
  password: ""
  collection_name: "pdf_chunks"
  dimension: 2560

llm:
  # Default provider: openai, anthropic, gemini, azure-openai
  default_provider: "openai"
  # Model configurations per provider
  providers:
    openai:
      api_key: ""
      base_url: "https://api.openai.com/v1"
      embedding_model: "text-embedding-3-small"
      chat_model: "gpt-4o-mini"
      vision_model: "gpt-4o-mini"  # For VQA
    anthropic:
      api_key: ""
      base_url: "https://api.anthropic.com/v1"
      chat_model: "claude-3-5-sonnet-20241022"
      vision_model: "claude-3-5-sonnet-20241022"
    gemini:
      api_key: ""
      base_url: "https://generativelanguage.googleapis.com/v1beta"
      chat_model: "gemini-2.0-flash"
      vision_model: "gemini-2.0-flash"
    azure-openai:
      api_key: ""
      base_url: "https://YOUR_RESOURCE.openai.azure.com"
      embedding_model: "text-embedding-3-small"
      chat_model: "gpt-4o-mini"
      api_version: "2024-02-01"

auth:
  jwt_secret: ""

upload:
  local_dir: "tmp/uploads"
  max_file_size_mb: 20
  allowed_ext_name: ".pdf"

asynq:
  concurrency: 10

chat:
  history_limit: 20
  retrieval_top_k: 5

# 文档解析配置（Phase 1: 结构化文档理解）
parser:
  chunk_size: 1000           # 父块最大字符数
  chunk_overlap: 200          # 父块重叠字符数
  child_chunk_size: 300       # 子块（用于召回）最大字符数
  extract_tables: true        # 提取表格结构
  table_max_rows: 100         # 单表最大行数
  table_max_cols: 20          # 单表最大列数
  extract_images: true        # 提取图片块
  image_min_size: 50          # 最小图片尺寸（像素）
  vlm_enabled: false          # 是否启用 VLM 图片描述（需配置 vl m.api_key）
  vlm_batch_size: 5           # VLM 批处理大小
  ocr_threshold: 0.1          # 文本密度阈值，低于此值触发 OCR
  ocr_enabled: true           # 启用 OCR 能力
  detect_headings: true       # 检测标题层级

# OCR 服务配置
ocr:
  provider: "fallback"        # "rapidocr" | "fallback"
  base_url: ""                # RapidOCR 服务地址（如 http://localhost:8868）

# VLM 视觉语言模型配置（图片描述生成）
vlm:
  enabled: false              # 是否启用 VLM 图片描述
  api_key: ""                 # API Key（默认复用 OPENAI_API_KEY）
  base_url: ""                # Base URL（默认复用 OPENAI_BASE_URL）
  model: "gpt-4o-mini"        # 模型名称

# ===== Phase 4: 文档级多模态 RAG =====
multimodal:
  enabled: true
  save_visual_regions: true
  visual_storage_root: "storage/visual"
  chart_extraction_enabled: true
  visual_rerank_enabled: true
  visual_generation_enabled: false
  max_visual_evidence: 2
  min_visual_score: 0.35

# ===== Phase 2: 混合检索配置 =====
hybrid_search:
  enabled: true               # 是否启用混合检索
  rrf_k: 60                   # RRF 融合常数
  top_k: 20                   # 初始召回数量
  rerank_top_k: 5             # Rerank 后返回数量
  min_confidence: 0.3         # Failover 置信度阈值
  max_retries: 1              # 最大重试次数

# Reranker 配置（API Key 从 .env 的 COHERE_API_KEY 读取）
reranker:
  provider: "cohere"          # "cohere" | "fallback"
  model: "rerank-v3.5"        # Cohere Rerank 模型
  base_url: "https://api.cohere.com/v2"
  timeout: 5                  # 超时秒数

# 意图重写配置（由 .env 的 ENABLE_INTENT_ROUTING / ENABLE_QUERY_REWRITE 控制）
intent_rewrite:
  max_context_terms: 3        # 规则重写时最多提取上下文术语数

# ===== Phase 3: 可信答案生成工作流 =====
trust_workflow:
  enabled: false              # 本地评测可用 ENABLE_TRUST_WORKFLOW=true 开启
  high_risk_only: true        # 仅表格/流程/风险/对比/图表/追问等高风险问题走工作流
  max_repair_attempts: 1      # v1 最多一次修复，避免延迟和成本失控

# 轻量 Citation Guard：默认 notebook chat 使用证据 ID 绑定段落引用
citation_guard:
  enabled: true
  high_risk_only: false
  repair_enabled: true
  max_repair_attempts: 1
  require_paragraph_citations: true
  validate_numbers: true
  validate_entity_phrases: true
  min_citation_coverage: 0.8
  fail_closed_for_high_risk: true
