app:
  name: "NotebookAI"
  env: "development"
  port: 8080

log:
  level: "debug"
  file_path: "logs/app.log"
  max_size: 100
  max_backups: 3
  max_age: 7
  compress: true

database:
  postgres:
    dsn: "host=localhost user=postgres password=postgres dbname=pdf_ai port=5433 sslmode=disable TimeZone=Asia/Shanghai"
    max_idle_conns: 10
    max_open_conns: 100
    conn_max_lifetime: 3600

cache:
  redis:
    addr: "localhost:6380"
    password: ""
    db: 0
    pool_size: 100
    min_idle_conns: 10

milvus:
  address: ""
  username: ""
  password: ""
  collection_name: "pdf_chunks"
  dimension: 1536

llm:
  # Default provider: openai, anthropic, gemini, azure-openai
  default_provider: "openai"
  # Model configurations per provider
  providers:
    openai:
      api_key: ""
      base_url: "https://api.openai.com/v1"
      embedding_model: "text-embedding-3-small"
      chat_model: "gpt-4o-mini"
      vision_model: "gpt-4o-mini"  # For VQA
    anthropic:
      api_key: ""
      base_url: "https://api.anthropic.com/v1"
      chat_model: "claude-3-5-sonnet-20241022"
      vision_model: "claude-3-5-sonnet-20241022"
    gemini:
      api_key: ""
      base_url: "https://generativelanguage.googleapis.com/v1beta"
      chat_model: "gemini-2.0-flash"
      vision_model: "gemini-2.0-flash"
    azure-openai:
      api_key: ""
      base_url: "https://YOUR_RESOURCE.openai.azure.com"
      embedding_model: "text-embedding-3-small"
      chat_model: "gpt-4o-mini"
      api_version: "2024-02-01"

auth:
  jwt_secret: ""

upload:
  local_dir: "tmp/uploads"
  max_file_size_mb: 20
  allowed_ext_name: ".pdf"

asynq:
  concurrency: 10

chat:
  history_limit: 20
  retrieval_top_k: 5
