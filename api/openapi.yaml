openapi: 3.0.3
info:
  title: Enterprise PDF AI API
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      summary: Register a user
      security: []
  /auth/login:
    post:
      summary: Login and get JWT
      security: []
  /me:
    get:
      summary: Get current user
  /dashboard/overview:
    get:
      summary: Dashboard overview
  /usage/summary:
    get:
      summary: Usage summary
  /documents:
    get:
      summary: List documents
    post:
      summary: Upload a document
  /documents/{id}:
    get:
      summary: Get document status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
    delete:
      summary: Delete a document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
  /chat/sessions:
    get:
      summary: List chat sessions
    post:
      summary: Create a chat session
  /chat/sessions/{id}/messages:
    get:
      summary: List chat messages
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
    post:
      summary: Send a message to a session
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
  /search:
    get:
      summary: Semantic search across indexed documents
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: top_k
          required: false
          schema:
            type: integer
