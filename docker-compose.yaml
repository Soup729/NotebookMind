services:
  postgres:
    image: postgres:15-alpine
    container_name: notebookmind_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pdf_ai
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdf_ai"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: notebookmind_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: notebookmind_api
    env_file:
      - .env
    environment:
      POSTGRES_DSN: host=postgres user=postgres password=postgres dbname=pdf_ai port=5432 sslmode=disable TimeZone=Asia/Shanghai
      REDIS_ADDR: redis:6379
      UPLOAD_LOCAL_DIR: /app/tmp/uploads
    ports:
      - "8081:8081"
    volumes:
      - ./logs:/app/logs
      - ./storage:/app/storage
      - ./tmp:/app/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/api/v1/ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: notebookmind_worker
    command: ["/app/worker"]
    env_file:
      - .env
    environment:
      POSTGRES_DSN: host=postgres user=postgres password=postgres dbname=pdf_ai port=5432 sslmode=disable TimeZone=Asia/Shanghai
      REDIS_ADDR: redis:6379
      UPLOAD_LOCAL_DIR: /app/tmp/uploads
    volumes:
      - ./logs:/app/logs
      - ./storage:/app/storage
      - ./tmp:/app/tmp
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8081/api/v1
    container_name: notebookmind_web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081/api/v1
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
